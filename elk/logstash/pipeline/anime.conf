# ============================================
# Pipeline Logstash - Indexation anime_gold_latest.csv
# Source : dataset gold produit par le DAG Transform
# Déclenché par le DAG 03_load_anime via Docker socket
# ============================================

input {
  file {
    path => "/usr/share/logstash/data_input/anime_gold_latest.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
    file_completed_action => "log"
    file_completed_log_path => "/tmp/logstash_done.log"
  }
}

filter {
  # Ignorer le header CSV
  if [message] =~ "^MAL_ID," {
    drop { }
  }

  csv {
    separator => ","
    autodetect_column_names => true
  }

  # ---- Conversions numériques de base ----
  mutate {
    convert => {
      "MAL_ID"           => "integer"
      "Score"            => "float"
      "Episodes"         => "integer"
      "Ranked"           => "float"
      "Popularity"       => "integer"
      "Members"          => "integer"
      "Favorites"        => "integer"
      "Watching"         => "integer"
      "Completed"        => "integer"
      "On-Hold"          => "integer"
      "Dropped"          => "integer"
      "Plan to Watch"    => "integer"
    }
  }

  # ---- Colonnes enrichies (feature engineering) ----
  mutate {
    convert => {
      "weighted_score"   => "float"
      "drop_ratio"       => "float"
      "engagement_ratio" => "float"
      "duration_min"     => "float"
      "year"             => "integer"
      "decade"           => "integer"
    }
  }

  # ---- Score distributions ----
  mutate {
    convert => {
      "Score-1"  => "float"
      "Score-2"  => "float"
      "Score-3"  => "float"
      "Score-4"  => "float"
      "Score-5"  => "float"
      "Score-6"  => "float"
      "Score-7"  => "float"
      "Score-8"  => "float"
      "Score-9"  => "float"
      "Score-10" => "float"
    }
  }

  # ---- Booléen is_outlier ----
  if [is_outlier] == "True" {
    mutate { replace => { "is_outlier" => true } }
    mutate { convert => { "is_outlier" => "boolean" } }
  } else {
    mutate { replace => { "is_outlier" => false } }
    mutate { convert => { "is_outlier" => "boolean" } }
  }

  # ---- Genres → array ----
  if [Genres] and [Genres] != "" {
    mutate {
      split => { "Genres" => ", " }
    }
  }

  # ---- Studios → array ----
  if [Studios] and [Studios] != "" {
    mutate {
      split => { "Studios" => ", " }
    }
  }

  # ---- Timestamp d'indexation ----
  ruby {
    code => "event.set('indexed_at', Time.now.utc.strftime('%Y-%m-%dT%H:%M:%SZ'))"
  }

  # ---- Nettoyage des champs Logstash internes ----
  mutate {
    remove_field => ["message", "@version", "host", "path", "event", "log"]
  }
}

output {
  elasticsearch {
    hosts           => ["http://elasticsearch:9200"]
    index           => "anime"
    document_id     => "%{MAL_ID}"
    action          => "index"
    # Bulk settings pour performance
    pool_max        => 10
    pool_max_per_route => 2
  }

  stdout {
    codec => dots
  }
}